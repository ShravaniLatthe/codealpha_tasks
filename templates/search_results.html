{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="profile-wrapper">

    <div class="section-heading">

        <h2>

            Search Results

        </h2>

    </div>

    {% if users %}

        <div class="posts-grid">

            {% for person in users %}

            <div class="post-card">

                <div class="post-content">

                    <h3>

                        {{ person.username }}

                    </h3>

                    <p>

                        {{ person.email }}

                    </p>

                    <a
                        href="{% url 'user_profile' person.username %}"
                        class="edit-btn"
                    >

                        View Profile

                    </a>

                </div>

            </div>

            {% endfor %}

        </div>

    {% else %}

        <div class="empty-posts">

            <h2>

                No users found.

            </h2>

            <p>

                Try searching with another username.

            </p>

        </div>

    {% endif %}

</div>

{% endblock %}
