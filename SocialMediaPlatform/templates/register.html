{% extends 'base.html' %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h2>

            <i class="fa-solid fa-user-plus"></i>

            Create Account

        </h2>

        <p class="subtitle">

            Join SocialSphere today

        </p>

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="email"
                name="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                name="password1"
                placeholder="Password"
                required
            >

            <input
                type="password"
                name="password2"
                placeholder="Confirm Password"
                required
            >

            <button>

                Register

            </button>

        </form>

        <div class="auth-footer">

            Already have an account?

            <a href="{% url 'login' %}">

                Login

            </a>

        </div>

    </div>

</div>

{% endblock %}
