{% extends 'base.html' %}

{% block content %}

<div class="form-container">

    <h1>Login</h1>

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Username"
            required>

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <br><br>

        <button class="btn">

            Login

        </button>

        <div class="register-link">
    <p>
        Don't have an account?
        <a href="{% url 'register' %}">
            Register Here
        </a>
    </p>
    </div>
    </form>

</div>

{% endblock %}
