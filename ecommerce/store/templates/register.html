{% extends 'base.html' %}

{% block content %}

<div class="form-container">

    <h1>Create Account</h1>

    <form method="POST">

        {% csrf_token %}

        <label>Username</label>
        {{ form.username }}

        <br><br>

        <label>Email</label>
        {{ form.email }}

        <br><br>

        <label>Password</label>
        {{ form.password1 }}

        <br><br>

        <label>Confirm Password</label>
        {{ form.password2 }}

        <br><br>

        <button class="btn" type="submit">
            Register
        </button>

    </form>

</div>

{% endblock %}
